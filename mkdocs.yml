site_name: codonanalyzer
site_description: Nextflow DSL2 codon analysis pipeline documentation
site_author: Abhinav Mishra
site_url: https://bibymaths.github.io/codonanalyzer
repo_url: https://github.com/bibymaths/codonanalyzer
repo_name: bibymaths/codonanalyzer

theme:
  name: material
  language: en
  font:
    text: Ubuntu           # The font for standard paragraph text
    code: Fira Code        # The font for code blocks
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo # Change this to your brand color!
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings
  - autorefs
  - glightbox
  - minify
  - git-revision-date-localized
  - awesome-pages
  - include-markdown

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.highlight

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - javascripts/extra.js

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Pipeline Overview: pipeline-overview.md
  - Processes: processes.md
  - Parameters: parameters.md
  - Output: output.md
  - API Reference (Perl):
      - codon.pl: api/codon.pl.md
      - longORF.pl: api/longORF.pl.md
      - translate.pl: api/translate.pl.md
      - hydropathy.pl: api/hydropathy.pl.md
  - Contributing: contributing.md
  - Changelog: changelog.md
  - Code of Conduct: code-of-conduct.md

copyright: >
  Copyright &copy; 2026 <a href="https://bibymaths.github.io">Abhinav Mishra</a>.